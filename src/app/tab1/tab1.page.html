<!-- Cabeçalho da página com o título principal -->
<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Desenvolvedor</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <!-- Sua foto na pasta assets -->
    <img src="assets/foto2.jpg" alt="Minha Foto" style="width: 100%; max-height: 250px; object-fit: cover;" />
    
    <ion-card-header>
      <!-- Seu Nome Completo -->
      <ion-card-title>Danilo Abreu</ion-card-title>
      <ion-card-subtitle>Aluno</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <p><strong>Turma:</strong> ADS</p>
      <p><strong>Unidade:</strong> Campo Grande</p>
      <p><strong>Turno:</strong> Manhã</p>
      <p style="margin-top: 10px; color: var(--ion-color-warning-dark, #e0a800);">
        <strong>Palavra-Chave:</strong> ....
      </p>
    </ion-card-content>
  </ion-card>

  <!-- O botão agora aponta diretamente para a rota da tab2 -->
  <ion-button 
    expand="block"
    fill="outline" 
    [routerLink]="['/tabs/tab2']" 
    routerDirection="forward" 
    style="margin-top: 15px;">
    Avançar para Cursos
  </ion-button>

</ion-content>
